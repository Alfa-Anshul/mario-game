version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mariodb
      POSTGRES_USER: mario
      POSTGRES_PASSWORD: mariopass123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mario -d mariodb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://mario:mariopass123@db:5432/mariodb
      SECRET_KEY: super_secret_mario_key_2024
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
